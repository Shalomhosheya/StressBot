<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Serenity — Stress Support</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink:      #1C2026;
  --mist:     #EEF3F1;
  --teal:     #3D7A74;
  --teal-lt:  #6BADA7;
  --teal-dk:  #295752;
  --fog:      #F6F9F8;
  --warm-mid: #8FA8A5;
  --sand:     #C9B99A;
  --crisis:   #B03A2E;
  --r:        16px;
  --sh:       0 6px 28px rgba(0,0,0,.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Jost', sans-serif;
  background: var(--fog);
  color: var(--ink);
  height: 100dvh;
  display: grid;
  grid-template-rows: auto auto 1fr auto auto;
  max-width: 740px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}

/* ── Ambient background ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 10% 10%, rgba(61,122,116,.08) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 90% 85%, rgba(201,185,154,.12) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── Header ── */
header {
  padding: 22px 28px 0;
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
  z-index: 1;
}
.mark {
  width: 44px; height: 44px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--teal) 0%, var(--teal-lt) 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 21px;
  box-shadow: 0 3px 12px rgba(61,122,116,.30);
  flex-shrink: 0;
}
.brand h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem;
  color: var(--teal-dk);
  letter-spacing: -.01em;
}
.brand p {
  font-size: .68rem;
  color: var(--warm-mid);
  text-transform: uppercase;
  letter-spacing: .07em;
  font-weight: 500;
}
.crisis-note {
  margin-left: auto;
  font-size: .65rem;
  color: var(--warm-mid);
  text-align: right;
  line-height: 1.5;
}
#reset-btn {
  background: none;
  border: 1px solid #D3DDD9;
  border-radius: 8px;
  padding: 5px 11px;
  font-size: .72rem;
  font-family: 'Jost', sans-serif;
  color: var(--warm-mid);
  cursor: pointer;
  margin-left: 10px;
  transition: background .15s;
}
#reset-btn:hover { background: #E8EFED; }

/* ── Intent ribbon ── */
.ribbon {
  padding: 8px 28px 0;
  min-height: 30px;
  position: relative; z-index: 1;
}
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: .7rem; font-weight: 500; letter-spacing: .04em;
  padding: 3px 10px; border-radius: 20px;
  opacity: 0; transition: opacity .35s;
}
.chip.show { opacity: 1; }
.chip.breathing  { background: #D6EAF8; color: #1A6F9E; }
.chip.cbt        { background: #D5F5E3; color: #1A7A47; }
.chip.validation { background: #FEF9E7; color: #9A7D0A; }
.chip.crisis     { background: #FDEDEC; color: var(--crisis); font-weight: 600; }
.chip.general    { background: #ECF0F1; color: #7F8C8D; }

/* ── Chat area ── */
#chat {
  overflow-y: auto;
  padding: 14px 28px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  position: relative; z-index: 1;
  scroll-behavior: smooth;
}
#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: #C5D4D1; border-radius: 4px; }

.row {
  display: flex;
  animation: rise .28s ease both;
}
.row.user { justify-content: flex-end; }
.row.bot  { align-items: flex-end; gap: 9px; }

@keyframes rise {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.av {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--teal-lt), var(--teal));
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
}

.bub {
  max-width: 76%;
  padding: 12px 16px;
  border-radius: var(--r);
  font-size: .9rem;
  line-height: 1.65;
}
.row.user .bub {
  background: var(--teal);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.row.bot .bub {
  background: #fff;
  color: var(--ink);
  border-bottom-left-radius: 4px;
  box-shadow: var(--sh);
}
.row.bot .bub.crisis {
  border-left: 3px solid var(--crisis);
}

/* typing dots */
.dots { display: flex; gap: 5px; padding: 6px 2px; }
.d {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--teal-lt);
  animation: bob .85s ease infinite;
}
.d:nth-child(2) { animation-delay: .17s; }
.d:nth-child(3) { animation-delay: .34s; }
@keyframes bob { 0%,100%{transform:translateY(0)} 45%{transform:translateY(-7px)} }

/* ── Quick prompts ── */
#quick {
  padding: 0 28px 6px;
  display: flex; flex-wrap: wrap; gap: 7px;
  position: relative; z-index: 1;
}
.qb {
  background: #fff;
  border: 1.5px solid #C8DAD7;
  color: var(--teal-dk);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: .76rem;
  font-family: 'Jost', sans-serif;
  cursor: pointer;
  transition: background .15s, border-color .15s;
}
.qb:hover { background: #E0F0EE; border-color: var(--teal-lt); }

/* ── Input bar ── */
#bar {
  padding: 10px 28px 20px;
  display: flex; gap: 10px; align-items: flex-end;
  position: relative; z-index: 1;
}
#msg {
  flex: 1;
  resize: none;
  border: 1.5px solid #D3DDD9;
  border-radius: 13px;
  padding: 11px 15px;
  font-family: 'Jost', sans-serif;
  font-size: .9rem;
  color: var(--ink);
  background: #fff;
  outline: none;
  line-height: 1.5;
  max-height: 110px;
  transition: border-color .2s;
}
#msg:focus { border-color: var(--teal); }
#msg::placeholder { color: #B0C0BD; }
#send {
  width: 44px; height: 44px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, var(--teal) 0%, var(--teal-lt) 100%);
  color: #fff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 3px 12px rgba(61,122,116,.30);
  transition: opacity .15s, transform .1s;
}
#send:hover { opacity: .88; }
#send:active { transform: scale(.94); }
#send:disabled { opacity: .35; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <div class="mark">🌿</div>
  <div class="brand">
    <h1>Serenity</h1>
    <p>Stress Support · Local AI</p>
  </div>
  <p class="crisis-note">Not a replacement for professional care.<br>Crisis? Call <strong>988</strong></p>
  <button id="reset-btn" onclick="resetChat()">↺ Reset</button>
</header>

<div class="ribbon"><span class="chip" id="chip"></span></div>

<div id="chat"></div>

<div id="quick">
  <button class="qb" onclick="useQuick('I feel so overwhelmed right now.')">😰 Overwhelmed</button>
  <button class="qb" onclick="useQuick('I can\'t stop overthinking.')">🔁 Overthinking</button>
  <button class="qb" onclick="useQuick('I need a breathing exercise.')">🌬️ Breathing help</button>
  <button class="qb" onclick="useQuick('I feel completely burnt out.')">🪫 Burnt out</button>
  <button class="qb" onclick="useQuick('Nobody understands what I\'m going through.')">💙 Feeling alone</button>
</div>

<div id="bar">
  <textarea id="msg" rows="1" placeholder="How are you feeling…"></textarea>
  <button id="send" onclick="send()">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<script>
const API = 'http://localhost:5000';
let sid = null, busy = false;

const chatEl = document.getElementById('chat');
const msgEl  = document.getElementById('msg');
const sendEl = document.getElementById('send');
const chipEl = document.getElementById('chip');
const quickEl= document.getElementById('quick');

const CHIP_META = {
  breathing:  { label: '🌬️ Breathing support',        cls: 'breathing'  },
  cbt:        { label: '🧠 Thought-reframing',          cls: 'cbt'        },
  validation: { label: '💙 Listening & validation',    cls: 'validation' },
  crisis:     { label: '🚨 Crisis resources included', cls: 'crisis'     },
  general:    { label: '🌿 General support',           cls: 'general'    },
};

msgEl.addEventListener('input', () => {
  msgEl.style.height = 'auto';
  msgEl.style.height = Math.min(msgEl.scrollHeight, 110) + 'px';
});
msgEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

function bubble(role, html, crisis = false) {
  const row = document.createElement('div');
  row.className = `row ${role}`;
  if (role === 'bot') {
    const av = document.createElement('div');
    av.className = 'av'; av.textContent = '🌿';
    row.appendChild(av);
  }
  const b = document.createElement('div');
  b.className = 'bub' + (crisis ? ' crisis' : '');
  b.innerHTML = html
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/•/g, '•')
    .replace(/\n/g, '<br>');
  row.appendChild(b);
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function showTyping() {
  const row = document.createElement('div');
  row.id = 'trow'; row.className = 'row bot';
  const av = document.createElement('div'); av.className='av'; av.textContent='🌿';
  const b  = document.createElement('div'); b.className='bub';
  b.innerHTML = '<div class="dots"><div class="d"></div><div class="d"></div><div class="d"></div></div>';
  row.appendChild(av); row.appendChild(b);
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
}
function hideTyping() { document.getElementById('trow')?.remove(); }

function setChip(intent) {
  const m = CHIP_META[intent] || CHIP_META.general;
  chipEl.textContent = m.label;
  chipEl.className   = `chip ${m.cls} show`;
}

async function send() {
  const text = msgEl.value.trim();
  if (!text || busy) return;
  quickEl.style.display = 'none';
  bubble('user', text);
  msgEl.value = ''; msgEl.style.height = 'auto';
  busy = true; sendEl.disabled = true;
  showTyping();

  try {
    const r    = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ message: text, session_id: sid }),
    });
    const data = await r.json();
    hideTyping();
    sid = data.session_id;
    setChip(data.intent);
    bubble('bot', data.response, data.intent === 'crisis');
  } catch {
    hideTyping();
    bubble('bot', '⚠️ Cannot reach the server. Make sure <code>server.py</code> is running on port 5000.');
  } finally {
    busy = false; sendEl.disabled = false; msgEl.focus();
  }
}

function useQuick(t) { msgEl.value = t; send(); }

async function resetChat() {
  if (sid) {
    fetch(`${API}/reset`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({session_id: sid})
    }).catch(()=>{});
  }
  sid = null;
  chatEl.innerHTML = '';
  chipEl.className = 'chip';
  quickEl.style.display = 'flex';
  greet();
}

function greet() {
  bubble('bot',
    "Hello 🌿 I'm Serenity, your stress support companion.\n\n" +
    "This is a safe space — share whatever's on your mind. " +
    "How are you feeling right now?"
  );
}

greet();
</script>
</body>
</html>
